training: 
  batch_size: 32
  epochs: 20
  lr: 0.001
  num_classes: 6
  seed: 42
  train_ratio: 0.7
  val_ratio: 0.15
  patience: 5

data: 
  num_workers: 4
  pin_memory: true
  

robustness:
  use_train_augmentation: true
  test_corruptions:
    - gaussian_noise
    - blur
    - brightness
  severity_levels: [1,3,5]