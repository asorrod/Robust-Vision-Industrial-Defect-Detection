training: 
  batch_size: 32
  epochs: 20
  lr: 0.001
  num_classes: 6
  seed: 42
  train_ratio: 0.7
  val_ratio: 0.15
  patience: 5

robustness_training:
  data_augment: True

  corruptions:
    - gaussian_noise
    - brightness
    - occlusion

  severity_levels: 2
 
  probability: 0.4

data: 
  num_workers: 4
  pin_memory: true
  

robustness:
  use_train_augmentation: true
  test_corruptions:
    - gaussian_noise
    - gaussian_blur
    - brightness
    - occlusion
  max_combination_size: 3
  severity_levels: [1,3,5]